<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<!-- Name Modal -->
<div class="modal-overlay" id="nameModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal">
    <h2 id="modalTitle">Festival Planner</h2>
    <p>Enter your name to get started</p>
    <input id="nameInput" type="text" placeholder="Your name..." maxlength="20" autocomplete="off" aria-label="Your name">
    <button type="button" id="enterBtn">Let's go ↗</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- Festival Picker -->
<div class="festival-picker" id="festivalPicker">
  <div class="picker-header">
    <div class="picker-logo">FESTIVAL PLANNER</div>
    <p class="picker-sub">Choose a festival to start planning</p>
  </div>
  <div class="festival-grid" id="festivalGrid"></div>
</div>

<header style="display:none">
  <div class="header-left">
    <button class="back-btn" id="backBtn" aria-label="Back to festival picker">
  <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6.5,1.5 2.5,5 6.5,8.5"/>
  </svg>
</button>
    <div class="logo">FESTIVAL PLANNER</div>
  </div>
  <div class="header-right">
    <div class="sync-indicator" aria-label="Sync status: local">
      <div class="sync-dot" aria-hidden="true"></div>
      <span id="syncLabel">Local</span>
    </div>
    <button class="user-badge" id="userBadge" aria-label="Change user">—</button>
  </div>
</header>

<div class="container" id="appMain" style="display:none">
  <div class="main-tabs" role="tablist" aria-label="Views">
    <button class="main-tab active" role="tab" aria-selected="true" id="tab-timeline" data-view="timeline">Timeline</button>
    <button class="main-tab" role="tab" aria-selected="false" id="tab-browse" data-view="browse">Browse</button>
    <button class="main-tab" role="tab" aria-selected="false" id="tab-picks" data-view="picks">My picks <span class="badge" id="sharedCount" style="display:none"></span></button>
    <button class="main-tab" role="tab" aria-selected="false" id="tab-prices" data-view="prices" style="display:none">Prices</button>
  </div>

  <div id="v-timeline" class="section visible" role="tabpanel" aria-labelledby="tab-timeline">
    <div class="stage-legend" id="legend"></div>
    <div class="day-tabs" id="tlDays" role="tablist" aria-label="Day selector"></div>
    <div class="timeline-scroll" tabindex="0" aria-label="Timeline — scroll horizontally"><div class="timeline-inner" id="tlInner"></div></div>
    <div class="tl-mobile" id="tlMobile"></div>
  </div>

  <div id="v-browse" class="section" role="tabpanel" aria-labelledby="tab-browse">
    <div class="day-tabs" id="brDays" role="tablist" aria-label="Day selector"></div>
    <div class="search-bar">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input type="search" id="searchInput" placeholder="Search all bands across all days..." aria-label="Search bands across all days">
    </div>
    <div class="search-result-count" id="searchCount" style="display:none"></div>
    <div class="browse-grid" id="brGrid"></div>
  </div>

  <div id="v-prices" class="section" role="tabpanel" aria-labelledby="tab-prices">
    <div id="pricesContent"></div>
  </div>

  <div id="v-picks" class="section" role="tabpanel" aria-labelledby="tab-picks">
    <div class="picks-header">
      <div class="picks-title">My Picks</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="online-users" id="onlineUsers"></div>
        <span class="online-label" id="onlineLabel"></span>
      </div>
    </div>
    <div class="local-notice">Picks are stored in this browser. Share this device to plan together, or compare screenshots with friends.</div>
    <div id="picksContent"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
