<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMM 2026 — Festival Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c1f;
  --surface3: #242428;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: #9e9e96;
  --accent: #e8c547;
  --clash: #e5533a;
  --fav: #e8c547;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── SKIP LINK (a11y) ── */
.skip-link {
  position: absolute; left: -9999px; top: 0;
  background: var(--accent); color: #000;
  padding: 8px 16px; z-index: 300;
  font-weight: 500; border-radius: 0 0 8px 0;
}
.skip-link:focus { left: 0; }

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--accent);
}
.logo span { color: var(--muted); font-size: 14px; letter-spacing: 1px; margin-left: 8px; }

.header-right { display: flex; align-items: center; gap: 12px; }

.sync-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4caf50; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.user-badge {
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  cursor: pointer;
}
.user-badge:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 13px;
  color: var(--text);
  z-index: 300;
  pointer-events: none;
  opacity: 0;
  transition: opacity .25s, transform .25s;
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LAYOUT ── */
.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

/* ── TABS ── */
.main-tabs {
  display: flex; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 1.5rem;
  width: fit-content;
}
.main-tab {
  padding: 7px 18px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all .2s;
  position: relative;
}
.main-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
.main-tab.active {
  background: var(--surface3);
  color: var(--text);
}
.main-tab .badge {
  position: absolute; top: 2px; right: 4px;
  background: var(--accent); color: #000;
  font-size: 9px; font-weight: 700;
  border-radius: 8px; padding: 1px 4px; min-width: 14px; text-align: center;
}

.day-tabs {
  display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.day-tab {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  transition: all .15s;
}
.day-tab:hover { border-color: var(--border2); color: var(--text); }
.day-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.day-tab.active { border-color: var(--accent); color: var(--accent); }

/* ── STAGE LEGEND ── */
.stage-legend {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem;
}
.legend-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── SEARCH ── */
.search-bar {
  margin-bottom: 1.25rem;
  position: relative;
}
.search-bar input {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 36px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search-bar input::placeholder { color: var(--muted); }
.search-bar input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 14px; pointer-events: none;
}

/* ── TIMELINE ── */
.timeline-scroll { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
.timeline-inner { min-width: 900px; }

.tl-ruler {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 2;
}
.tl-stage-label-hdr {
  width: 120px; min-width: 120px;
  border-right: 1px solid var(--border);
  padding: 8px;
}
.tl-ruler-times { flex: 1; position: relative; height: 32px; }
.tl-tick {
  position: absolute;
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--muted);
  transform: translateX(-50%);
  top: 8px;
  white-space: nowrap;
}
.tl-tick::after {
  content: '';
  position: absolute;
  left: 50%; top: 18px;
  width: 1px; height: 8px;
  background: var(--border);
}

.tl-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  min-height: 58px;
}
.tl-row:last-child { border-bottom: none; }

.tl-stage-label {
  width: 120px; min-width: 120px;
  padding: 8px 10px;
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  border-right: 1px solid var(--border);
  display: flex; align-items: center;
  background: var(--surface);
  letter-spacing: .5px;
}

.tl-slots { flex: 1; position: relative; background: var(--bg); }

.tl-slots::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 1px, transparent 1px, transparent calc(100% / var(--tick-count)));
  pointer-events: none;
}

.tl-band {
  position: absolute;
  top: 5px; bottom: 5px;
  border-radius: 5px;
  display: flex; align-items: center;
  padding: 0 8px;
  cursor: pointer;
  overflow: hidden;
  transition: filter .15s, transform .1s;
  font-size: 11px; font-weight: 500;
  white-space: nowrap;
  border: 1.5px solid transparent;
  user-select: none;
}
.tl-band:hover, .tl-band:focus-visible { filter: brightness(1.15); transform: scaleY(1.04); z-index: 2; }
.tl-band:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.tl-band.fav { border-width: 2px; }
.tl-band.clash::before {
  content: '⚡';
  font-size: 10px;
  margin-right: 3px;
  flex-shrink: 0;
}
.tl-band.clash { outline: 2px solid var(--clash); outline-offset: -1px; }
.tl-band .fav-star {
  margin-left: auto; padding-left: 6px;
  font-size: 12px; opacity: .7; flex-shrink: 0;
}

/* Tooltip */
.tl-band .tl-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--text);
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
.tl-band:hover .tl-tooltip, .tl-band:focus-visible .tl-tooltip { display: block; }

/* ── BROWSE ── */
.browse-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 8px;
}
.band-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.band-card:hover, .band-card:focus-visible { border-color: var(--border2); background: var(--surface2); }
.band-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.band-card.fav { border-color: var(--fav); background: rgba(232,197,71,.05); }
.band-card.clash-card { border-color: var(--clash); }

.stage-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
.band-info { flex: 1; min-width: 0; }
.band-name { font-size: 13px; font-weight: 500; color: var(--text); }
.band-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

.clash-tag {
  font-size: 10px; font-family: 'DM Mono', monospace;
  padding: 2px 6px; border-radius: 4px;
  background: rgba(229,83,58,.18); color: var(--clash);
  flex-shrink: 0;
}
.fav-star-btn { font-size: 18px; color: var(--muted); flex-shrink: 0; transition: color .15s; }
.fav-star-btn.on { color: var(--fav); }

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--muted);
  padding: 2rem 0;
  font-size: 14px;
}

/* ── PICKS ── */
.picks-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem;
}
.picks-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
.online-users {
  display: flex; align-items: center;
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}
.online-users .avatar + .avatar { margin-left: -6px; }
.online-label { font-size: 12px; color: var(--muted); margin-left: 10px; }

.picks-user-section { margin-bottom: 1.5rem; }
.picks-user-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.picks-user-name { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
.picks-count { font-size: 12px; color: var(--muted); }
.clash-summary {
  background: rgba(229,83,58,.1);
  border: 1px solid rgba(229,83,58,.25);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 1rem;
  font-size: 12px;
  color: #f07060;
}
.clash-summary strong { font-weight: 600; }
.clash-line { margin-top: 4px; }

.picks-day { margin-bottom: 12px; }
.picks-day-label {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
}
.picks-list { display: flex; flex-direction: column; gap: 5px; }
.pick-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  transition: border-color .15s;
}
.pick-item[role="button"] { cursor: pointer; }
.pick-item[role="button"]:hover { border-color: var(--border2); }
.pick-item[role="button"]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.pick-item.clash-pick { border-color: rgba(229,83,58,.4); }
.pick-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pick-name { font-weight: 500; flex: 1; }
.pick-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

.empty-msg { padding: 3rem 0; text-align: center; color: var(--muted); font-size: 14px; }

.local-notice {
  font-size: 11px; color: var(--muted); margin-bottom: 1rem;
  padding: 8px 12px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
}

/* ── NAME MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(4px);
}
.modal-overlay[aria-hidden="true"] { display: none; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 2rem;
  width: 340px;
  text-align: center;
}
.modal h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 1.5px;
  color: var(--accent);
  margin-bottom: 6px;
}
.modal p { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
.modal input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 12px;
  outline: none;
  transition: border-color .15s;
}
.modal input:focus { border-color: var(--accent); }
.modal button {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity .15s;
}
.modal button:hover { opacity: .85; }
.modal button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

.section { display: none; }
.section.visible { display: block; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  header { padding: 0 1rem; }
  .logo span { display: none; }
  .container { padding: 1rem; }

  .main-tabs { width: 100%; }
  .main-tab { flex: 1; text-align: center; padding: 7px 10px; font-size: 12px; }

  .stage-legend { gap: 6px; }
  .legend-pill { font-size: 11px; padding: 3px 8px; }

  .timeline-inner { min-width: 700px; }
  .tl-stage-label, .tl-stage-label-hdr { width: 90px; min-width: 90px; font-size: 10px; }

  .browse-grid { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .timeline-inner { min-width: 600px; }
  .tl-stage-label, .tl-stage-label-hdr { width: 70px; min-width: 70px; }
  .tl-band { font-size: 10px; padding: 0 4px; }
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>

<!-- Name Modal -->
<div class="modal-overlay" id="nameModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 id="modalTitle">GMM 2026</h2>
    <p>Enter your name to join the festival planner</p>
    <input id="nameInput" type="text" placeholder="Your name..." maxlength="20" autocomplete="off" aria-label="Your name">
    <button type="button" id="enterBtn">Enter the pit ↗</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<header>
  <div class="logo">GRASPOP 2026 <span>FESTIVAL PLANNER</span></div>
  <div class="header-right">
    <div class="sync-indicator" aria-label="Sync status: live">
      <div class="sync-dot" aria-hidden="true"></div>
      <span id="syncLabel">Local</span>
    </div>
    <button class="user-badge" id="userBadge" aria-label="Change user">—</button>
  </div>
</header>

<div class="container" id="main">
  <div class="main-tabs" role="tablist" aria-label="Views">
    <button class="main-tab active" role="tab" aria-selected="true" id="tab-timeline" data-view="timeline">Timeline</button>
    <button class="main-tab" role="tab" aria-selected="false" id="tab-browse" data-view="browse">Browse</button>
    <button class="main-tab" role="tab" aria-selected="false" id="tab-picks" data-view="picks">My picks <span class="badge" id="sharedCount" style="display:none"></span></button>
  </div>

  <!-- TIMELINE -->
  <div id="v-timeline" class="section visible" role="tabpanel" aria-labelledby="tab-timeline">
    <div class="stage-legend" id="legend"></div>
    <div class="day-tabs" id="tlDays" role="tablist" aria-label="Day selector"></div>
    <div class="timeline-scroll" tabindex="0" aria-label="Timeline — scroll horizontally"><div class="timeline-inner" id="tlInner"></div></div>
  </div>

  <!-- BROWSE -->
  <div id="v-browse" class="section" role="tabpanel" aria-labelledby="tab-browse">
    <div class="day-tabs" id="brDays" role="tablist" aria-label="Day selector"></div>
    <div class="search-bar">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input type="search" id="searchInput" placeholder="Search bands..." aria-label="Search bands">
    </div>
    <div class="browse-grid" id="brGrid"></div>
  </div>

  <!-- PICKS -->
  <div id="v-picks" class="section" role="tabpanel" aria-labelledby="tab-picks">
    <div class="picks-header">
      <div class="picks-title">My Picks</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="online-users" id="onlineUsers"></div>
        <span class="online-label" id="onlineLabel"></span>
      </div>
    </div>
    <div class="local-notice">Picks are stored in this browser. Share this device to plan together, or compare screenshots with friends.</div>
    <div id="picksContent"></div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const STAGE_CFG = {
  "South Stage":   {color:"#b8a9f0", bg:"rgba(184,169,240,0.18)", dark:"#7e6fd4"},
  "North Stage":   {color:"#7ec8e3", bg:"rgba(126,200,227,0.18)", dark:"#4aa8cb"},
  "Marquee":       {color:"#7ed9a0", bg:"rgba(126,217,160,0.18)", dark:"#4bb878"},
  "Jupiler Stage": {color:"#f0a07a", bg:"rgba(240,160,122,0.18)", dark:"#d47848"},
  "Metal Dome":    {color:"#f0d07a", bg:"rgba(240,208,122,0.18)", dark:"#c8a830"},
};
const STAGES = Object.keys(STAGE_CFG);
const DAYS = ["Thursday 18th June","Friday 19th June","Saturday 20th June","Sunday 21st June"];
const DAY_SHORT = ["Thu 18","Fri 19","Sat 20","Sun 21"];

const AVATAR_COLORS = ["#b8a9f0","#7ec8e3","#7ed9a0","#f0a07a","#f0d07a","#e8c547","#f07ba0","#a0d4f0"];

function toMins(t){const[h,m]=t.split(":").map(Number);return h*60+m;}

// Proper display of times past midnight
function fmtT(mins){
  let h = Math.floor(mins/60);
  const m = mins % 60;
  // Display 24:00+ as 00:xx, 01:xx etc for the ruler
  if(h >= 24) h -= 24;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

// For ruler display, show "00:30" but annotate "+1" for next-day times
function fmtRuler(mins){
  const h = Math.floor(mins/60);
  const m = mins % 60;
  const dh = h >= 24 ? h - 24 : h;
  const suffix = h >= 24 ? "⁺¹" : "";
  return `${String(dh).padStart(2,"0")}:${String(m).padStart(2,"0")}${suffix}`;
}

const RAW = {
  "South Stage":{
    "Thursday 18th June":[["12:50","13:35","Ego Kill Talent"],["14:30","15:15","Danko Jones"],["16:20","17:10","Accept"],["18:20","19:20","A Day To Remember"],["20:40","21:55","Within Temptation"],["23:30","25:00","The Offspring"]],

// ─── STATE ───────────────────────────────────────────────────────────────────

const STORAGE_KEY = "gmm2026_picks";
let currentUser = null;
let activeDay = 0; // synced across views
let currentView = "timeline";
let searchQuery = "";
let lastStateHash = "";

// ─── STORAGE ─────────────────────────────────────────────────────────────────

function loadShared(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); } catch(e){ return {}; }
}
function saveShared(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  try { ch.postMessage("update"); } catch(e){}
}

let ch;
try {
  ch = new BroadcastChannel("gmm2026");
  ch.onmessage = () => { render(); };
} catch(e){ ch = {postMessage:()=>{}}; }

// Reduced polling — only refresh if data actually changed
setInterval(() => {
  const hash = localStorage.getItem(STORAGE_KEY) || "";
  if(hash !== lastStateHash){ lastStateHash = hash; render(); }
}, 3000);

function getMyPicks(){
  const data = loadShared();
  return new Set(data[currentUser]?.picks || []);
}

function togglePick(bKey){
  if(!currentUser) return;
  const data = loadShared();
  if(!data[currentUser]) data[currentUser] = {name: currentUser, color: getUserColor(currentUser), picks:[]};
  const picks = new Set(data[currentUser].picks);
  const wasAdded = !picks.has(bKey);
  picks.has(bKey) ? picks.delete(bKey) : picks.add(bKey);
  data[currentUser].picks = [...picks];
  saveShared(data);
  lastStateHash = JSON.stringify(data);

  // Toast feedback
  const {name} = parseBandKey(bKey);
  showToast(wasAdded ? `★ Added ${name}` : `Removed ${name}`);
  render();
}

function bandKey(name, day){ return `${name}||${day}`; }
function parseBandKey(k){ const i=k.indexOf("||"); return {name:k.slice(0,i), day:k.slice(i+2)}; }

// ─── TOAST ───────────────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> el.classList.remove("show"), 1800);
}

// ─── USER MANAGEMENT ────────────────────────────────────────────────────────

function getUserColor(name){
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function getInitials(name){ return name.slice(0,2).toUpperCase(); }

function setUser(){
  const val = document.getElementById("nameInput").value.trim();
  if(!val) return;
  currentUser = val;
  document.getElementById("userBadge").textContent = val;
  closeModal();
  const data = loadShared();
  if(!data[currentUser]){ data[currentUser] = {name:currentUser, color:getUserColor(currentUser), picks:[]}; saveShared(data); }
  render();
}

function openModal(){
  const overlay = document.getElementById("nameModal");
  overlay.removeAttribute("aria-hidden");
  const inp = document.getElementById("nameInput");
  inp.value = currentUser || "";
  // Focus trap
  setTimeout(() => inp.focus(), 50);
  document.addEventListener("keydown", modalKeyHandler);
}

function closeModal(){
  document.getElementById("nameModal").setAttribute("aria-hidden","true");
  document.removeEventListener("keydown", modalKeyHandler);
}

function modalKeyHandler(e){
  if(e.key === "Escape"){ if(currentUser) closeModal(); }
  if(e.key === "Tab"){
    // Trap focus within modal
    const modal = document.querySelector(".modal");
    const focusable = modal.querySelectorAll("input, button");
    const first = focusable[0], last = focusable[focusable.length-1];
    if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }
}

// ─── CLASH DETECTION (cached per render) ─────────────────────────────────────

let clashCache = null;
let clashCacheKey = "";

function getBandData(name, day){
  for(const stage of STAGES){
    for(const [s,e,n] of (RAW[stage][day]||[])){
      if(n===name) return {name,day,stage,start:toMins(s),end:toMins(e),startStr:s,endStr:e};
    }
  }
  return null;
}

function getClashKeys(picks){
  const key = [...picks].sort().join("|");
  if(key === clashCacheKey && clashCache) return clashCache;

  const bands = [...picks].map(k=>{ const {name,day}=parseBandKey(k); return getBandData(name,day); }).filter(Boolean);
  const clashKeys = new Set();
  const clashPairs = [];
  for(let i=0;i<bands.length;i++){
    for(let j=i+1;j<bands.length;j++){
      const a=bands[i],b=bands[j];
      if(a.day===b.day && a.start<b.end && b.start<a.end){
        clashKeys.add(bandKey(a.name,a.day));
        clashKeys.add(bandKey(b.name,b.day));
        clashPairs.push([a,b]);
      }
    }
  }
  clashCache = {clashKeys, clashPairs};
  clashCacheKey = key;
  return clashCache;
}

// Main tabs
document.querySelector(".main-tabs").addEventListener("click", e => {

  const view = tab.dataset.view;

// User badge
document.getElementById("userBadge").addEventListener("click", openModal);

// Modal enter
document.getElementById("enterBtn").addEventListener("click", setUser);
document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") setUser(); });

// Search
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.toLowerCase().trim();
  renderBrowse();
});

// Timeline clicks (delegated)
document.getElementById("tlInner").addEventListener("click", e => {
  const band = e.target.closest(".tl-band");

});

// Timeline keyboard
document.getElementById("tlInner").addEventListener("keydown", e => {

    const band = e.target.closest(".tl-band");
    if(!band || !currentUser) return;
    e.preventDefault();
    togglePick(band.dataset.key);
  }

// Browse clicks (delegated)
document.getElementById("brGrid").addEventListener("click", e => {
  const card = e.target.closest(".band-card");
  if(!card || !currentUser) return;

document.getElementById("brGrid").addEventListener("keydown", e => {
  if(e.key === "Enter" || e.key === " "){
    const card = e.target.closest(".band-card");
    if(!card || !currentUser) return;
    e.preventDefault();
    togglePick(card.dataset.key);
  }
});

document.getElementById("picksContent").addEventListener("click", e => {
  const item = e.target.closest(".pick-item[data-key]");

document.getElementById("picksContent").addEventListener("keydown", e => {
  if(e.key === "Enter" || e.key === " "){
    const item = e.target.closest(".pick-item[data-key]");
    if(!item || !currentUser) return;
    e.preventDefault();
    togglePick(item.dataset.key);
  }
});

// Day tab clicks (delegated — both day tab sets)
document.addEventListener("click", e => {
  const dt = e.target.closest(".day-tab");
  if(!dt) return;
  const idx = parseInt(dt.dataset.day, 10);
  if(isNaN(idx)) return;
  activeDay = idx;
  render();
});

// ─── VIEW SWITCHING ──────────────────────────────────────────────────────────

function switchView(v){
  currentView = v;
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("visible"));
  document.getElementById("v-"+v).classList.add("visible");
  document.querySelectorAll(".main-tab").forEach(t=>{
    const isActive = t.dataset.view === v;
    t.classList.toggle("active", isActive);
    t.setAttribute("aria-selected", isActive);
  });
  render();
}

function render(){
  if(currentView==="timeline") renderTimeline();
  else if(currentView==="browse") renderBrowse();
  else if(currentView==="picks") renderPicks();
  updateSharedCount();
  renderOnlineUsers();
}

// ─── LEGEND ──────────────────────────────────────────────────────────────────
function buildLegend(){
  document.getElementById("legend").innerHTML = STAGES.map(s=>`
    <div class="legend-pill">
      <div class="legend-dot" style="background:${STAGE_CFG[s].color}"></div>
      ${s}
    </div>`).join("");
}

// ─── DAY TABS ────────────────────────────────────────────────────────────────
function buildDayTabs(containerId){
  document.getElementById(containerId).innerHTML =
    DAYS.map((d,i)=>`<button class="day-tab${i===activeDay?" active":""}" role="tab" aria-selected="${i===activeDay}" data-day="${i}">${DAY_SHORT[i]}</button>`).join("");
}

// ─── TIMELINE ────────────────────────────────────────────────────────────────
function renderTimeline(){
  buildDayTabs("tlDays");
  const day = DAYS[activeDay];
  const myPicks = getMyPicks();
  const {clashKeys} = getClashKeys(myPicks);

  let minT=720, maxT=780;
  for(const st of STAGES) for(const [s,e] of (RAW[st][day]||[])){
    minT=Math.min(minT,toMins(s)); maxT=Math.max(maxT,toMins(e));
  }
  minT=Math.floor(minT/30)*30; maxT=Math.ceil(maxT/30)*30;
  const span = maxT-minT;
  const tickCount = span/30;

  const ticks=[];
  for(let t=minT;t<=maxT;t+=30) ticks.push(t);

  let html = `<div class="tl-ruler">
    <div class="tl-stage-label-hdr"></div>
    <div class="tl-ruler-times">
      ${ticks.map(t=>`<span class="tl-tick" style="left:${((t-minT)/span*100).toFixed(2)}%">${fmtRuler(t)}</span>`).join("")}
    </div>
  </div>`;

  for(const stage of STAGES){
    const cfg = STAGE_CFG[stage];
    const bands = RAW[stage][day]||[];
    html += `<div class="tl-row">
      <div class="tl-stage-label" style="border-left:3px solid ${cfg.color}">${stage}</div>
      <div class="tl-slots" style="--tick-count:${tickCount}">`;
    for(const [s,e,name] of bands){
      const sm=toMins(s), em=toMins(e);
      const left=((sm-minT)/span*100).toFixed(2);
      const width=((em-sm)/span*100).toFixed(2);
      const k = bandKey(name,day);
      const isFav = myPicks.has(k);
      const isClash = clashKeys.has(k);
      const bdr = isFav ? `border-color:${cfg.color};border-width:2px` : "";
      const displayS = fmtRuler(toMins(s));
      const displayE = fmtRuler(toMins(e));
      html += `<div class="tl-band${isFav?" fav":""}${isClash?" clash":""}"
        style="left:${left}%;width:calc(${width}% - 2px);background:${cfg.bg};color:${cfg.color};${bdr}"
        data-key="${escAttr(k)}"
        tabindex="0"
        role="button"
        aria-label="${escAttr(name)}, ${stage}, ${displayS} to ${displayE}${isFav?', favorited':''}${isClash?', time clash':''}"
        >
        <span style="overflow:hidden;text-overflow:ellipsis">${esc(name)}</span>
        ${isFav?`<span class="fav-star" aria-hidden="true">★</span>`:""}
        <span class="tl-tooltip">${esc(name)}<br>${stage} · ${displayS}–${displayE}</span>
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById("tlInner").innerHTML = html;
}

// ─── BROWSE ──────────────────────────────────────────────────────────────────
function renderBrowse(){
  buildDayTabs("brDays");
  const day = DAYS[activeDay];
  const myPicks = getMyPicks();
  const {clashKeys} = getClashKeys(myPicks);

  const list = [];
  for(const stage of STAGES) for(const [s,e,name] of (RAW[stage][day]||[])) list.push({name,stage,s,e});
  list.sort((a,b)=>toMins(a.s)-toMins(b.s));

  const filtered = searchQuery
    ? list.filter(b => b.name.toLowerCase().includes(searchQuery) || b.stage.toLowerCase().includes(searchQuery))
    : list;

  if(filtered.length === 0){
    document.getElementById("brGrid").innerHTML = `<div class="no-results">${searchQuery ? `No bands matching "${esc(searchQuery)}"` : "No bands this day"}</div>`;
    return;
  }

  document.getElementById("brGrid").innerHTML = filtered.map(({name,stage,s,e})=>{
    const k=bandKey(name,day);
    const fav=myPicks.has(k), clash=clashKeys.has(k);
    const cfg=STAGE_CFG[stage];
    return `<div class="band-card${fav?" fav":""}${clash?" clash-card":""}" data-key="${escAttr(k)}" tabindex="0" role="button" aria-label="${escAttr(name)}, ${stage}, ${s} to ${e}">
      <div class="stage-bar" style="background:${cfg.color}" aria-hidden="true"></div>
      <div class="band-info">
        <div class="band-name">${esc(name)}</div>
        <div class="band-meta">${stage} · ${s}–${e}</div>
      </div>
      ${clash?`<span class="clash-tag" aria-label="Time clash">⚡ clash</span>`:""}
      <span class="fav-star-btn${fav?" on":""}" aria-hidden="true">${fav?"★":"☆"}</span>
    </div>`;
  }).join("");
}

// ─── PICKS ───────────────────────────────────────────────────────────────────
function renderPicks(){
  const data = loadShared();
  const users = Object.keys(data).filter(u=>data[u].picks?.length>0);
  const c = document.getElementById("picksContent");

  if(!users.length){ c.innerHTML=`<div class="empty-msg">No picks yet — star some bands to add them here!</div>`; return; }

  // Sort: current user first
  users.sort((a,b) => (a===currentUser?-1:b===currentUser?1:a.localeCompare(b)));

  let html = "";
  for(const uname of users){
    const ud = data[uname];
    const picks = new Set(ud.picks||[]);
    const {clashKeys, clashPairs} = getClashKeys(picks);
    const color = ud.color || getUserColor(uname);
    const isMe = uname === currentUser;

    html += `<div class="picks-user-section">
      <div class="picks-user-header">
        <div class="avatar" style="background:${color};color:#000">${getInitials(uname)}</div>
        <span class="picks-user-name" style="color:${color}">${esc(uname)}${isMe?" (you)":""}</span>
        <span class="picks-count">${picks.size} pick${picks.size!==1?"s":""}</span>
      </div>`;

    if(clashPairs.length){
      html += `<div class="clash-summary" role="alert">`;
      html += clashPairs.map(([a,b])=>`<div class="clash-line">⚡ <strong>${esc(a.name)}</strong> vs <strong>${esc(b.name)}</strong> — ${a.day.split(" ")[0]} ${fmtRuler(a.start)}–${fmtRuler(a.end)} overlaps ${fmtRuler(b.start)}–${fmtRuler(b.end)}</div>`).join("");
      html += `</div>`;
    }

    for(const day of DAYS){
      const dayPicks = [...picks].filter(k=>parseBandKey(k).day===day)
        .map(k=>getBandData(parseBandKey(k).name, day)).filter(Boolean)
        .sort((a,b)=>a.start-b.start);
      if(!dayPicks.length) continue;

      html += `<div class="picks-day">
        <div class="picks-day-label">${day}</div>
        <div class="picks-list">`;
      for(const b of dayPicks){
        const k=bandKey(b.name,b.day);
        const clash=clashKeys.has(k);
        const cfg=STAGE_CFG[b.stage];
        const interactive = isMe;
        html += `<div class="pick-item${clash?" clash-pick":""}" ${interactive?`role="button" tabindex="0" data-key="${escAttr(k)}"`:""}>
          <div class="pick-dot" style="background:${cfg.color}" aria-hidden="true"></div>
          <span class="pick-name">${esc(b.name)}</span>
          <span class="pick-meta">${b.stage} · ${fmtRuler(b.start)}–${fmtRuler(b.end)}</span>
          ${clash?`<span class="clash-tag" aria-label="Time clash">⚡ clash</span>`:""}
          ${isMe?`<span style="color:${color};font-size:14px;margin-left:4px" aria-hidden="true">★</span>`:""}
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  c.innerHTML = html;
}

function updateSharedCount(){
  const data = loadShared();
  const myCount = (data[currentUser]?.picks?.length) || 0;
  const el = document.getElementById("sharedCount");
  if(myCount>0){ el.textContent=myCount; el.style.display="inline-block"; }
  else el.style.display="none";
}

function renderOnlineUsers(){
  const data = loadShared();
  const users = Object.keys(data).filter(u=>data[u].picks?.length>0);
  const uEl = document.getElementById("onlineUsers");
  const lEl = document.getElementById("onlineLabel");
  uEl.innerHTML = users.slice(0,6).map(u=>{
    const color = data[u]?.color || getUserColor(u);
    return `<div class="avatar" style="background:${color};color:#000" aria-label="${esc(u)}">${getInitials(u)}</div>`;
  }).join("");
  lEl.textContent = users.length ? `${users.length} planner${users.length!==1?"s":""}` : "";
}

// ─── ESCAPING (XSS prevention) ───────────────────────────────────────────────

function esc(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s){
  return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildLegend();
render();
// Modal starts visible; don't close it until user enters a name
document.getElementById("nameInput").focus();
