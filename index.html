<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMM 2025 — Festival Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c1f;
  --surface3: #242428;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ede8;
  --muted: #888880;
  --accent: #e8c547;
  --clash: #e5533a;
  --fav: #e8c547;

  --south:  #b8a9f0;
  --north:  #7ec8e3;
  --marq:   #7ed9a0;
  --jupiler:#f0a07a;
  --dome:   #f0d07a;

  --south-bg:  rgba(184,169,240,0.15);
  --north-bg:  rgba(126,200,227,0.15);
  --marq-bg:   rgba(126,217,160,0.15);
  --jupiler-bg:rgba(240,160,122,0.15);
  --dome-bg:   rgba(240,208,122,0.15);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--accent);
}
.logo span { color: var(--muted); font-size: 14px; letter-spacing: 1px; margin-left: 8px; }

.header-right { display: flex; align-items: center; gap: 12px; }

.sync-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4caf50; animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.user-badge {
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  cursor: pointer;
}

/* ── LAYOUT ── */
.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

/* ── TABS ── */
.main-tabs {
  display: flex; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 1.5rem;
  width: fit-content;
}
.main-tab {
  padding: 7px 18px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all .2s;
  position: relative;
}
.main-tab.active {
  background: var(--surface3);
  color: var(--text);
}
.main-tab .badge {
  position: absolute; top: 2px; right: 4px;
  background: var(--accent); color: #000;
  font-size: 9px; font-weight: 700;
  border-radius: 8px; padding: 1px 4px; min-width: 14px; text-align: center;
}

.day-tabs {
  display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap;
}
.day-tab {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  transition: all .15s;
}
.day-tab:hover { border-color: var(--border2); color: var(--text); }
.day-tab.active { border-color: var(--accent); color: var(--accent); }

/* ── STAGE LEGEND ── */
.stage-legend {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem;
}
.legend-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── TIMELINE ── */
.timeline-scroll { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
.timeline-inner { min-width: 1000px; }

.tl-ruler {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
}
.tl-stage-label-hdr {
  width: 130px; min-width: 130px;
  border-right: 1px solid var(--border);
  padding: 8px;
}
.tl-ruler-times { flex: 1; position: relative; height: 32px; }
.tl-tick {
  position: absolute;
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--muted);
  transform: translateX(-50%);
  top: 8px;
  white-space: nowrap;
}
.tl-tick::after {
  content: '';
  position: absolute;
  left: 50%; top: 18px;
  width: 1px; height: 8px;
  background: var(--border);
}

.tl-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  min-height: 58px;
}
.tl-row:last-child { border-bottom: none; }

.tl-stage-label {
  width: 130px; min-width: 130px;
  padding: 8px 10px;
  font-size: 11px; font-weight: 500;
  color: var(--muted);
  border-right: 1px solid var(--border);
  display: flex; align-items: center;
  background: var(--surface);
  letter-spacing: .5px;
}

.tl-slots { flex: 1; position: relative; background: var(--bg); }

/* subtle grid lines */
.tl-slots::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 1px, transparent 1px, transparent calc(100% / var(--tick-count)));
  pointer-events: none;
}

.tl-band {
  position: absolute;
  top: 5px; bottom: 5px;
  border-radius: 5px;
  display: flex; align-items: center;
  padding: 0 8px;
  cursor: pointer;
  overflow: hidden;
  transition: filter .15s, transform .1s;
  font-size: 11px; font-weight: 500;
  white-space: nowrap;
  border: 1.5px solid transparent;
  user-select: none;
}
.tl-band:hover { filter: brightness(1.15); transform: scaleY(1.04); z-index: 2; }
.tl-band.fav { border-width: 2px; }
.tl-band.clash { outline: 2px solid var(--clash); outline-offset: -1px; }
.tl-band .fav-star {
  margin-left: auto; padding-left: 6px;
  font-size: 12px; opacity: .7; flex-shrink: 0;
}

/* ── BROWSE ── */
.browse-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 8px;
}
.band-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.band-card:hover { border-color: var(--border2); background: var(--surface2); }
.band-card.fav { border-color: var(--fav); background: rgba(232,197,71,.05); }
.band-card.clash-card { border-color: var(--clash); }

.stage-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
.band-info { flex: 1; min-width: 0; }
.band-name { font-size: 13px; font-weight: 500; color: var(--text); }
.band-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

.clash-tag {
  font-size: 10px; font-family: 'DM Mono', monospace;
  padding: 2px 6px; border-radius: 4px;
  background: rgba(229,83,58,.18); color: var(--clash);
  flex-shrink: 0;
}
.fav-star-btn { font-size: 18px; color: var(--muted); flex-shrink: 0; transition: color .15s; }
.fav-star-btn.on { color: var(--fav); }

/* ── PICKS (SHARED) ── */
.picks-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.25rem;
}
.picks-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
.online-users {
  display: flex; gap: -4px; align-items: center;
}
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
  margin-left: -6px;
  flex-shrink: 0;
}
.avatar:first-child { margin-left: 0; }
.online-label { font-size: 12px; color: var(--muted); margin-left: 10px; }

.picks-user-section { margin-bottom: 1.5rem; }
.picks-user-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.picks-user-name { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; }
.picks-count { font-size: 12px; color: var(--muted); }
.clash-summary {
  background: rgba(229,83,58,.1);
  border: 1px solid rgba(229,83,58,.25);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 1rem;
  font-size: 12px;
  color: #f07060;
}
.clash-summary strong { font-weight: 600; }
.clash-line { margin-top: 4px; }

.picks-day { margin-bottom: 12px; }
.picks-day-label {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); font-family: 'DM Mono', monospace;
  margin-bottom: 6px;
}
.picks-list { display: flex; flex-direction: column; gap: 5px; }
.pick-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 12px;
  cursor: pointer;
  transition: border-color .15s;
}
.pick-item.clash-pick { border-color: rgba(229,83,58,.4); }
.pick-item:hover { border-color: var(--border2); }
.pick-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pick-name { font-weight: 500; flex: 1; }
.pick-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

.empty-msg { padding: 3rem 0; text-align: center; color: var(--muted); font-size: 14px; }

/* ── NAME MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 2rem;
  width: 340px;
  text-align: center;
}
.modal h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: 1.5px;
  color: var(--accent);
  margin-bottom: 6px;
}
.modal p { color: var(--muted); font-size: 13px; margin-bottom: 1.5rem; }
.modal input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 12px;
  outline: none;
  transition: border-color .15s;
}
.modal input:focus { border-color: var(--accent); }
.modal button {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity .15s;
}
.modal button:hover { opacity: .85; }

.section { display: none; }
.section.visible { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<!-- Name Modal -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h2>GMM 2025</h2>
    <p>Enter your name to join the shared festival planner</p>
    <input id="nameInput" type="text" placeholder="Your name..." maxlength="20" autocomplete="off">
    <button onclick="setUser()">Enter the pit ↗</button>
  </div>
</div>

<header>
  <div class="logo">GRASPOP 2025 <span>FESTIVAL PLANNER</span></div>
  <div class="header-right">
    <div class="sync-indicator">
      <div class="sync-dot"></div>
      <span id="syncLabel">Live</span>
    </div>
    <div class="user-badge" id="userBadge" onclick="changeUser()">—</div>
  </div>
</header>

<div class="container">
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchView('timeline',this)">Timeline</button>
    <button class="main-tab" onclick="switchView('browse',this)">Browse</button>
    <button class="main-tab" onclick="switchView('picks',this)">Shared picks <span class="badge" id="sharedCount" style="display:none"></span></button>
  </div>

  <!-- TIMELINE -->
  <div id="v-timeline" class="section visible">
    <div class="stage-legend" id="legend"></div>
    <div class="day-tabs" id="tlDays"></div>
    <div class="timeline-scroll"><div class="timeline-inner" id="tlInner"></div></div>
  </div>

  <!-- BROWSE -->
  <div id="v-browse" class="section">
    <div class="day-tabs" id="brDays"></div>
    <div class="browse-grid" id="brGrid"></div>
  </div>

  <!-- PICKS -->
  <div id="v-picks" class="section">
    <div class="picks-header">
      <div class="picks-title">Shared Picks</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="online-users" id="onlineUsers"></div>
        <span class="online-label" id="onlineLabel"></span>
      </div>
    </div>
    <div id="picksContent"></div>
  </div>
</div>

// ─── SHARED STATE (localStorage as shared layer) ─────────────────────────────
// Key: "gmm2025_picks"  → {username: {name, color, picks: ["band|day", ...]}}

const STORAGE_KEY = "gmm2025_picks";
const USERS_KEY = "gmm2025_users";

let currentUser = null;

function loadShared(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); } catch(e){ return {}; }
}
function saveShared(data){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); broadcastChange(); }

function broadcastChange(){
  // Use BroadcastChannel to sync across tabs
  try { ch.postMessage("update"); } catch(e){}
}

let ch;
try {
  ch = new BroadcastChannel("gmm2025");
  ch.onmessage = () => { refresh(); };
} catch(e){ ch = {postMessage:()=>{}}; }

// Also poll every 3s as fallback
setInterval(refresh, 3000);

function getMyPicks(){
  const data = loadShared();
  return new Set(data[currentUser]?.picks || []);
}

function togglePick(bandKey){
  const data = loadShared();
  if(!data[currentUser]) data[currentUser] = {name: currentUser, color: getUserColor(currentUser), picks:[]};
  const picks = new Set(data[currentUser].picks);
  picks.has(bandKey) ? picks.delete(bandKey) : picks.add(bandKey);
  data[currentUser].picks = [...picks];
  saveShared(data);
  refresh();
}

function bandKey(name, day){ return `${name}||${day}`; }
function parseBandKey(k){ const p=k.split("||"); return {name:p[0], day:p[1]}; }

// ─── USER MANAGEMENT ────────────────────────────────────────────────────────

function getUserColor(name){
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function getInitials(name){ return name.slice(0,2).toUpperCase(); }

function setUser(){
  const val = document.getElementById("nameInput").value.trim();
  if(!val) return;
  currentUser = val;
  document.getElementById("userBadge").textContent = val;
  document.getElementById("nameModal").style.display = "none";
  // Register user
  const data = loadShared();
  if(!data[currentUser]) { data[currentUser] = {name:currentUser, color:getUserColor(currentUser), picks:[]}; saveShared(data); }
  refresh();
}

function changeUser(){
  document.getElementById("nameInput").value = currentUser || "";
  document.getElementById("nameModal").style.display = "flex";
}

document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") setUser(); });

// ─── CLASH DETECTION ─────────────────────────────────────────────────────────

function getBandData(name, day){
  for(const stage of STAGES){
    for(const [s,e,n] of (RAW[stage][day]||[])){
      if(n===name) return {name,day,stage,start:toMins(s),end:toMins(e),startStr:s,endStr:e};
    }
  }
  return null;
}

function getClashKeys(picks){
  const bands = [...picks].map(k=>{ const {name,day}=parseBandKey(k); return getBandData(name,day); }).filter(Boolean);
  const clashKeys = new Set();
  const clashPairs = [];
  for(let i=0;i<bands.length;i++){
    for(let j=i+1;j<bands.length;j++){
      const a=bands[i],b=bands[j];
      if(a.day===b.day && a.start<b.end && b.start<a.end){
        clashKeys.add(bandKey(a.name,a.day));
        clashKeys.add(bandKey(b.name,b.day));
        clashPairs.push([a,b]);
      }
    }
  }
  return {clashKeys, clashPairs};
}

// ─── VIEWS ───────────────────────────────────────────────────────────────────

let tlDay=0, brDay=0, currentView="timeline";

function switchView(v, btn){
  currentView=v;
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("visible"));
  document.getElementById("v-"+v).classList.add("visible");
  document.querySelectorAll(".main-tab").forEach(t=>t.classList.remove("active"));
  if(btn) btn.classList.add("active");
  render();
}

function render(){
  if(currentView==="timeline") renderTimeline();
  else if(currentView==="browse") renderBrowse();
  else if(currentView==="picks") renderPicks();
  updateSharedCount();
  renderOnlineUsers();
}

function refresh(){ render(); }

// ─── LEGEND ──────────────────────────────────────────────────────────────────
function buildLegend(){
  const c = document.getElementById("legend");
  c.innerHTML = STAGES.map(s=>`
    <div class="legend-pill">
      <div class="legend-dot" style="background:${STAGE_CFG[s].color}"></div>
      ${s}
    </div>`).join("");
}

// ─── TIMELINE ────────────────────────────────────────────────────────────────
function buildDayTabs(containerId, active, fn){
  document.getElementById(containerId).innerHTML =
    DAYS.map((d,i)=>`<button class="day-tab${i===active?" active":""}" onclick="${fn}(${i})">${DAY_SHORT[i]}</button>`).join("");
}

function switchTlDay(i){ tlDay=i; buildDayTabs("tlDays",tlDay,"switchTlDay"); renderTimeline(); }

function renderTimeline(){
  buildDayTabs("tlDays",tlDay,"switchTlDay");
  const day = DAYS[tlDay];
  const myPicks = getMyPicks();
  const {clashKeys} = getClashKeys(myPicks);

  // compute time range
  let minT=720, maxT=780;
  for(const st of STAGES) for(const [s,e] of (RAW[st][day]||[])){
    minT=Math.min(minT,toMins(s)); maxT=Math.max(maxT,toMins(e));
  }
  minT=Math.floor(minT/30)*30; maxT=Math.ceil(maxT/30)*30;
  const span = maxT-minT;
  const tickCount = (maxT-minT)/30;

  // ruler ticks
  const ticks=[];
  for(let t=minT;t<=maxT;t+=30) ticks.push(t);

  let html = `<div class="tl-ruler">
    <div class="tl-stage-label-hdr"></div>
    <div class="tl-ruler-times">
      ${ticks.map(t=>`<span class="tl-tick" style="left:${((t-minT)/span*100).toFixed(2)}%">${fmtT(t)}</span>`).join("")}
    </div>
  </div>`;

  for(const stage of STAGES){
    const cfg = STAGE_CFG[stage];
    const bands = RAW[stage][day]||[];
    html += `<div class="tl-row">
      <div class="tl-stage-label" style="border-left:3px solid ${cfg.color}">${stage}</div>
      <div class="tl-slots" style="--tick-count:${tickCount}">`;
    for(const [s,e,name] of bands){
      const sm=toMins(s), em=toMins(e);
      const left=((sm-minT)/span*100).toFixed(2);
      const width=((em-sm)/span*100).toFixed(2);
      const k = bandKey(name,day);
      const isFav = myPicks.has(k);
      const isClash = clashKeys.has(k);
      const bdr = isFav ? `border-color:${cfg.color};border-width:2px` : "";
      html += `<div class="tl-band${isFav?" fav":""}${isClash?" clash":""}"
        style="left:${left}%;width:calc(${width}% - 2px);background:${cfg.bg};color:${cfg.color};${bdr}"
        onclick="tlToggle('${name.replace(/'/g,"\\'")}','${day}')"
        title="${name} · ${s}–${e}">
        <span style="overflow:hidden;text-overflow:ellipsis">${name}</span>
        ${isFav?`<span class="fav-star">★</span>`:""}
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById("tlInner").innerHTML = html;
}

function tlToggle(name, day){ if(!currentUser)return; togglePick(bandKey(name,day)); }

// ─── BROWSE ──────────────────────────────────────────────────────────────────
function switchBrDay(i){ brDay=i; buildDayTabs("brDays",brDay,"switchBrDay"); renderBrowse(); }

function renderBrowse(){
  buildDayTabs("brDays",brDay,"switchBrDay");
  const day = DAYS[brDay];
  const myPicks = getMyPicks();
  const {clashKeys} = getClashKeys(myPicks);

  // all bands for the day, sorted by time
  const list = [];
  for(const stage of STAGES) for(const [s,e,name] of (RAW[stage][day]||[])) list.push({name,stage,s,e});
  list.sort((a,b)=>toMins(a.s)-toMins(b.s));

  document.getElementById("brGrid").innerHTML = list.map(({name,stage,s,e})=>{
    const k=bandKey(name,day);
    const fav=myPicks.has(k), clash=clashKeys.has(k);
    const cfg=STAGE_CFG[stage];
    return `<div class="band-card${fav?" fav":""}${clash?" clash-card":""}" onclick="brToggle('${name.replace(/'/g,"\\'")}','${day}')">
      <div class="stage-bar" style="background:${cfg.color}"></div>
      <div class="band-info">
        <div class="band-name">${name}</div>
        <div class="band-meta">${stage} · ${s}–${e}</div>
      </div>
      ${clash?`<span class="clash-tag">clash</span>`:""}
      <span class="fav-star-btn${fav?" on":""}">${fav?"★":"☆"}</span>
    </div>`;
  }).join("");
}

function brToggle(name, day){ if(!currentUser)return; togglePick(bandKey(name,day)); }

// ─── SHARED PICKS ────────────────────────────────────────────────────────────
function renderPicks(){
  const data = loadShared();
  const users = Object.keys(data).filter(u=>data[u].picks?.length>0);
  const c = document.getElementById("picksContent");

  if(!users.length){ c.innerHTML=`<div class="empty-msg">No picks yet — star some bands to add them here!</div>`; return; }

  let html = "";
  for(const uname of users){
    const ud = data[uname];
    const picks = new Set(ud.picks||[]);
    const {clashKeys, clashPairs} = getClashKeys(picks);
    const color = ud.color || getUserColor(uname);
    const isMe = uname === currentUser;

    html += `<div class="picks-user-section">
      <div class="picks-user-header">
        <div class="avatar" style="background:${color};color:#000;margin-left:0">${getInitials(uname)}</div>
        <span class="picks-user-name" style="color:${color}">${uname}${isMe?" (you)":""}</span>
        <span class="picks-count">${picks.size} pick${picks.size!==1?"s":""}</span>
      </div>`;

    if(clashPairs.length){
      html += `<div class="clash-summary">`;
      html += clashPairs.map(([a,b])=>`<div class="clash-line">⚡ <strong>${a.name}</strong> vs <strong>${b.name}</strong> — ${a.day.split(" ")[0]} ${a.startStr}–${a.endStr} overlaps ${b.startStr}–${b.endStr}</div>`).join("");
      html += `</div>`;
    }

    for(const day of DAYS){
      const dayPicks = [...picks].filter(k=>parseBandKey(k).day===day)
        .map(k=>getBandData(parseBandKey(k).name, day)).filter(Boolean)
        .sort((a,b)=>a.start-b.start);
      if(!dayPicks.length) continue;

      html += `<div class="picks-day">
        <div class="picks-day-label">${day}</div>
        <div class="picks-list">`;
      for(const b of dayPicks){
        const k=bandKey(b.name,b.day);
        const clash=clashKeys.has(k);
        const cfg=STAGE_CFG[b.stage];
        html += `<div class="pick-item${clash?" clash-pick":""}" ${isMe?`onclick="togglePick('${k.replace(/'/g,"\\'")}')"`:""}>
          <div class="pick-dot" style="background:${cfg.color}"></div>
          <span class="pick-name">${b.name}</span>
          <span class="pick-meta">${b.stage} · ${b.startStr}–${b.endStr}</span>
          ${clash?`<span class="clash-tag">clash</span>`:""}
          ${isMe?`<span style="color:${color};font-size:14px;margin-left:4px">★</span>`:""}
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  c.innerHTML = html;
}

function updateSharedCount(){
  const data = loadShared();
  const total = Object.values(data).reduce((n,u)=>n+(u.picks?.length||0),0);
  const el = document.getElementById("sharedCount");
  if(total>0){ el.textContent=total; el.style.display="inline-block"; }
  else el.style.display="none";
}

function renderOnlineUsers(){
  const data = loadShared();
  const users = Object.keys(data);
  const uEl = document.getElementById("onlineUsers");
  const lEl = document.getElementById("onlineLabel");
  uEl.innerHTML = users.slice(0,6).map(u=>{
    const color = data[u]?.color || getUserColor(u);
    return `<div class="avatar" style="background:${color};color:#000">${getInitials(u)}</div>`;
  }).join("");
  lEl.textContent = users.length ? `${users.length} planner${users.length!==1?"s":""}` : "";
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildLegend();
render();
</script>
</body>
</html>
